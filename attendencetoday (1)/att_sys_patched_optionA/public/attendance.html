<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Record Attendance</title>
  <style>
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#eef2f7;margin:0;padding:0;}
    header{background:#0066cc;color:#fff;padding:15px;display:flex;align-items:center;}
    header a{color:#fff;text-decoration:none;margin-right:20px;}
    .container{max-width:1000px;margin:30px auto;padding:0 20px;}
    .form-row{display:flex;gap:15px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
    select, option, input[type=date]{padding:8px 12px;border:1px solid #ccc;border-radius:4px;color:#000;}
    .btn{padding:8px 14px;background:#0066cc;color:#fff;border:none;border-radius:4px;cursor:pointer;text-decoration:none;}
    table{width:100%;border-collapse:collapse;background:#fff;}
    th,td{padding:10px;border:1px solid #ddd;text-align:left;}
    th{background:#f0f0f0;}
    .status-btn{padding:4px 8px;border:none;border-radius:4px;color:#fff;cursor:pointer;}
    .present{background:#28a745;}
    .absent{background:#dc3545;}
  </style>
</head>
<body>
  <header>
    <a href="/dashboard.html">&larr; Back to Dashboard</a>
    <h1>Record Attendance</h1>
  </header>
  <div class="container">
    <div class="form-row">
      <label>Select Class:
        <select id="classSelect"><option>Loading...</option></select>
      </label>
      <button class="btn" id="uploadClassBtn" type="button">Upload Class Details</button>
      <label>Date:
        <input type="date" id="attDate"/>
      </label>
      <button class="btn" id="addStudentBtn">+ Add Student</button>
      <button class="btn" id="saveAttendBtn">Save Attendance</button>
      <button class="btn" id="pdfAttendBtn">Download PDF</button>
    </div>
    <table id="studentsTable">
      <thead>
        <tr>
          <th>Student Name</th>
          <th>USN</th>
          <th>Gender</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Small modal page to enter student details -->
  <div id="studentModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);justify-content:center;align-items:center;z-index:1000;">
    <div style="background:#fff;border-radius:8px;padding:20px;width:320px;box-shadow:0 2px 8px rgba(0,0,0,0.2);">
      <h3 style="margin-top:0;margin-bottom:15px;">Add Student</h3>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <input id="stuName" type="text" placeholder="Student Name" style="padding:8px;border:1px solid #ccc;border-radius:4px;">
        <input id="stuUsn" type="text" placeholder="USN" style="padding:8px;border:1px solid #ccc;border-radius:4px;">
        <input id="stuGender" type="text" placeholder="Gender" style="padding:8px;border:1px solid #ccc;border-radius:4px;">
        <select id="stuStatus" style="padding:8px;border:1px solid #ccc;border-radius:4px;">
          <option value="present">Present</option>
          <option value="absent">Absent</option>
        </select>
      </div>
      <div style="margin-top:15px;display:flex;justify-content:flex-end;gap:10px;">
        <button id="cancelStudentBtn" class="btn" type="button" style="background:#6c757d;">Cancel</button>
        <button id="saveStudentBtn" class="btn" type="button">Add</button>
      </div>
    </div>
  </div>

  <script>
    // Ensure DOM is fully ready before wiring buttons
    window.addEventListener('load', () => {
      let classes = [];
      let students = [];
      const classSelect = document.getElementById('classSelect');
      const attDate = document.getElementById('attDate');

      if (!classSelect || !attDate) {
        alert('Attendance page failed to initialize. Please refresh.');
        return;
      }

      // We show ONLY the classes the teacher added in "Upload Class Details"
      // (stored in localStorage), but those classes are also synced to DB and
      // get a real `id` that we use for loading students / saving attendance.
      const storageKey = 'classManagementData';
      const classKey = (r) => `${(r.className||'').trim().toLowerCase()}|${(r.section||'').trim().toLowerCase()}|${(r.subjectCode||'').trim().toLowerCase()}|${(r.subjectName||'').trim().toLowerCase()}`;

      async function upsertClassToServer(r) {
        const resp = await fetch('/classes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            className: r.className,
            section: r.section,
            subjectCode: r.subjectCode,
            subjectName: r.subjectName,
            hours: r.hours
          })
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok || data.error) throw new Error(data.error || 'Failed to save class');
        return data; // {id, display, ...}
      }

      async function loadClasses() {
        classSelect.innerHTML = '<option value="">Loading...</option>';
        let local = [];
        try {
          local = JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch (e) {
          local = [];
        }

        // de-dup local list
        const deduped = [];
        const seen = new Set();
        for (const r of local) {
          const key = classKey(r);
          if (!key || seen.has(key)) continue;
          seen.add(key);
          deduped.push(r);
        }

        // sync any missing ids to the server so we can use DB ids everywhere
        let changed = false;
        for (const r of deduped) {
          if (!r.id) {
            try {
              const saved = await upsertClassToServer(r);
              r.id = saved.id;
              changed = true;
            } catch (e) {
              console.warn('Could not sync class to server', e);
            }
          }
        }
        if (changed) {
          try {
            localStorage.setItem(storageKey, JSON.stringify(deduped));
          } catch (e) {}
        }

        classes = deduped.filter(r => !!r.id);
        if (!classes.length) {
          classSelect.innerHTML = '<option value="">No classes (click Upload Class Details)</option>';
          return;
        }

        classSelect.innerHTML = '<option value="">-- select --</option>';
        classes.forEach(r => {
          const opt = document.createElement('option');
          opt.value = r.id; // DB class id
          opt.textContent = `${r.className} - ${r.section} - ${r.subjectName}`;
          classSelect.appendChild(opt);
        });
      }

      function renderStudents() {
        const tbody = document.querySelector('#studentsTable tbody');
        tbody.innerHTML = '';
        students.forEach((s, index) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${s.name}</td>
            <td>${s.usn}</td>
            <td>${s.gender || ''}</td>
            <td>
              <button class="status-btn ${s.status ? 'present' : 'absent'}">
                ${s.status ? 'Present' : 'Absent'}
              </button>
            </td>
            <td>
              <button type="button" class="btn delete-btn" style="background:#dc3545;">Delete</button>
            </td>
          `;

          const statusBtn = tr.querySelector('.status-btn');
          statusBtn.addEventListener('click', () => {
            s.status = !s.status;
            renderStudents();
          });

          const deleteBtn = tr.querySelector('.delete-btn');
          deleteBtn.addEventListener('click', () => {
            students.splice(index, 1);
            renderStudents();
          });

          tbody.appendChild(tr);
        });
      }

      // When a class is selected, load its default students from the backend
      classSelect.addEventListener('change', async () => {
        const classId = classSelect.value;
        students = [];
        if (classId) {
          try {
            const resp = await fetch(`/classes/${classId}/students`);
            const data = await resp.json();
            if (Array.isArray(data.students)) {
              students = data.students.map(s => ({
                name: s.name,
                usn: s.usn,
                gender: s.gender,
                status: true // default to present
              }));
            }
          } catch (err) {
            console.error('Failed to load students for class', err);
          }
        }
        renderStudents();
      });

      // elements for the small "Add Student" page (modal)
      const studentModal = document.getElementById('studentModal');
      const stuName = document.getElementById('stuName');
      const stuUsn = document.getElementById('stuUsn');
      const stuGender = document.getElementById('stuGender');
      const stuStatus = document.getElementById('stuStatus');
      const saveStudentBtn = document.getElementById('saveStudentBtn');
      const cancelStudentBtn = document.getElementById('cancelStudentBtn');
      const uploadClassBtn = document.getElementById('uploadClassBtn');

      function openStudentModal() {
        if (!classSelect.value) {
          alert('Please select a class first.');
          return;
        }
        stuName.value = '';
        stuUsn.value = '';
        stuGender.value = '';
        stuStatus.value = 'present';
        studentModal.style.display = 'flex';
      }

      function closeStudentModal() {
        studentModal.style.display = 'none';
      }

      document.getElementById('addStudentBtn').addEventListener('click', openStudentModal);

      saveStudentBtn.addEventListener('click', () => {
        const name = (stuName.value || '').trim();
        const usn = (stuUsn.value || '').trim();
        const gender = (stuGender.value || '').trim();
        const statusVal = stuStatus.value === 'present';

        if (!name || !usn) {
          alert('Please enter at least Student Name and USN.');
          return;
        }

        students.push({ name, usn, gender, status: statusVal });
        renderStudents();
        closeStudentModal();
      });

      cancelStudentBtn.addEventListener('click', closeStudentModal);

      // Go to Upload Class Details page directly from here
      if (uploadClassBtn) {
        uploadClassBtn.addEventListener('click', () => {
          window.location.href = '/class_management.html';
        });
      }

      document.getElementById('saveAttendBtn').addEventListener('click', async () => {
        const classId = classSelect.value;
        const date = attDate.value;
        if (!classId || !date) {
          alert('Select class and date first');
          return;
        }
        if (!students.length) {
          alert('No students to save');
          return;
        }
        try {
          const resp = await fetch('/attendance/mark', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              classId: parseInt(classId),
              date,
              marks: students.map(s => ({
                usn: s.usn,
                present: !!s.status,
                name: s.name,
                gender: s.gender
              }))
            })
          });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok || data.error) {
            throw new Error(data.error || 'Failed to save attendance');
          }
          alert('Attendance saved successfully');
        } catch (err) {
          alert('Failed to save attendance: ' + err.message);
        }
      });

      document.getElementById('pdfAttendBtn').addEventListener('click', async () => {
        const classId = classSelect.value;
        const date = attDate.value;
        if (!classId || !date) {
          alert('Select class and date first');
          return;
        }
        const url = `/attendance/download?classId=${classId}&date=${date}`;
        try {
          const resp = await fetch(url);
          if (!resp.ok) throw new Error('Network error');
          const blob = await resp.blob();
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = `attendance_${classId}_${date}.pdf`;
          document.body.appendChild(link);
          link.click();
          link.remove();
        } catch (err) {
          alert('Failed to download PDF: ' + err.message);
        }
      });

      // initial kick
      loadClasses();
    });
  </script>
</body>
</html>
