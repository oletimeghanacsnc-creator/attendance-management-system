<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Attendance Reports</title>
<style>
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#eef2f7;margin:0;padding:0}
header{background:#0066cc;color:#fff;padding:15px;display:flex;align-items:center}
header a{color:#fff;text-decoration:none;margin-right:20px}
.container{max-width:1000px;margin:30px auto;padding:0 20px}
.form-row{display:flex;gap:15px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
select{padding:8px 12px;border:1px solid #ccc;border-radius:4px}
.btn{padding:8px 14px;background:#0066cc;color:#fff;border:none;border-radius:4px;cursor:pointer;text-decoration:none}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{padding:10px;border:1px solid #ddd;text-align:left}
th{background:#f0f0f0}
.perc-good{color:#28a745}
.perc-bad{color:#dc3545}
</style>
</head>
<body>
<header>
<a href="/dashboard.html">&larr; Back to Dashboard</a>
<h1>Attendance Reports</h1>
</header>
<div class="container">
<div class="form-row">
<select id="classSelect"><option>Loading...</option></select>
<select id="periodSelect"><option value="7">Last 7 days</option><option value="30">Last 30 days</option></select>
<select id="rangeSelect"><option value="0-100">All (0-100%)</option><option value="0-50">0-50%</option><option value="50-100">50-100%</option></select>
<button class="btn" id="loadBtn">Load Report</button>
<button class="btn" id="pdfBtn">PDF</button>
</div>
<table id="reportTable">
<thead><tr><th>Name</th><th>USN</th><th>Presents</th><th>Absents</th><th>Total</th><th>Percentage (%)</th></tr></thead>
<tbody></tbody>
</table>
</div>
<script>
// Load only the classes the teacher created (localStorage), no hard-coded defaults.
// These classes are also synced to DB and have a real `id` which we use for reports.
const storageKey = 'classManagementData';
const classKey = (r) => `${(r.className||'').trim().toLowerCase()}|${(r.section||'').trim().toLowerCase()}|${(r.subjectCode||'').trim().toLowerCase()}|${(r.subjectName||'').trim().toLowerCase()}`;
let classes = [];
const classSelect = document.getElementById('classSelect');
const periodSelect = document.getElementById('periodSelect');
const rangeSelect = document.getElementById('rangeSelect');

async function upsertClassToServer(r) {
  const resp = await fetch('/classes', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      className: r.className,
      section: r.section,
      subjectCode: r.subjectCode,
      subjectName: r.subjectName,
      hours: r.hours
    })
  });
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok || data.error) throw new Error(data.error || 'Failed to save class');
  return data;
}

async function loadClassesForReports() {
  classSelect.innerHTML = '<option value="">Loading...</option>';
  let local = [];
  try {
    local = JSON.parse(localStorage.getItem(storageKey) || '[]');
  } catch (e) {
    local = [];
  }

  // de-dup local list
  const deduped = [];
  const seen = new Set();
  for (const r of local) {
    const key = classKey(r);
    if (!key || seen.has(key)) continue;
    seen.add(key);
    deduped.push(r);
  }

  // sync any missing ids
  let changed = false;
  for (const r of deduped) {
    if (!r.id) {
      try {
        const saved = await upsertClassToServer(r);
        r.id = saved.id;
        changed = true;
      } catch (e) {
        console.warn('Could not sync class to server', e);
      }
    }
  }
  if (changed) {
    try { localStorage.setItem(storageKey, JSON.stringify(deduped)); } catch (e) {}
  }

  classes = deduped.filter(r => !!r.id);
  if (!classes.length) {
    classSelect.innerHTML = '<option value="">No classes (use Upload Class Details)</option>';
    return;
  }

  classSelect.innerHTML = '<option value="">-- select class --</option>';
  classes.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.id;
    opt.textContent = `${r.className} - ${r.section} - ${r.subjectName}`;
    classSelect.appendChild(opt);
  });
}

function renderReport(data){
  const tbody=document.querySelector('#reportTable tbody');
  tbody.innerHTML='';
  data.forEach(r=>{
    const tr=document.createElement('tr');
    const pct = r.total ? Math.round((r.presents / r.total) * 100) : 0;
    const abs = r.absents != null ? r.absents : (r.total - r.presents);
    tr.innerHTML =
      `<td>${r.name}</td>`+
      `<td>${r.usn}</td>`+
      `<td>${r.presents}</td>`+
      `<td>${abs}</td>`+
      `<td>${r.total}</td>`+
      `<td class="${pct>=50?'perc-good':'perc-bad'}">${pct}%</td>`;
    tbody.appendChild(tr);
  });
}

document.getElementById('loadBtn').addEventListener('click', async () => {
  const classId = classSelect.value;
  const period = periodSelect.value;
  const range = rangeSelect.value;
  if (!classId) {
    alert('Please select a class first');
    return;
  }
  const url = `/reports?classId=${classId}&period=${period}&range=${range}`;
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (!resp.ok || data.error) {
      throw new Error(data.error || 'Failed to load report');
    }
    renderReport(data.rows || []);
  } catch (err) {
    alert('Failed to load report: ' + err.message);
  }
});

document.getElementById('pdfBtn').addEventListener('click',async()=>{
  const classId = classSelect.value;
  const period = periodSelect.value;
  const range = rangeSelect.value;
  if (!classId) {
    alert('Please select a class first');
    return;
  }
  const url = `/reports/download?classId=${classId}&period=${period}&range=${range}`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('Network error');
    const blob = await resp.blob();
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `attendance_report_class_${classId}.pdf`;
    document.body.appendChild(link);
    link.click();
    link.remove();
  } catch(err){
    alert('Failed to download PDF: '+err.message);
  }
});

// initial
loadClassesForReports();
</script>
</body>
</html>
