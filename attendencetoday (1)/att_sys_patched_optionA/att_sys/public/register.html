<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Register — Attendance System</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width:560px;margin:40px auto; background-color:white">
      <h2 style="color:darkblue">Teacher Registration</h2>
      <form id="registerForm" style="margin-top:16px;background-color:white">
        <label style="color:black">Name</label>
        <input class="input" style="background-color:rgb(226, 232, 234); color:black" type="text" name="name" required>
        <label style="margin-top:10px;color:black">Username</label>
        <input class="input" style="background-color:rgb(226, 232, 234); color:black"type="text" name="username" required>
        <label style="margin-top:10px;color:black">Password</label>
        <input class="input" style="background-color:rgb(226, 232, 234); color:black"type="password" name="password" required>
        <div class="row" style="margin-top:16px;">
          <button type="submit" class="btn">Create Account</button>
          <a class="link" href="/login.html" style="align-self:center;">Login</a>
        </div>
      </form>
      <p id="msg" class="muted" style="margin-top:12px;"></p>
    </div>
  </div>
  <script src="/register.js"></script>
</body>
</html>
