<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | Attendance Management System</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="auth-wrap">
    <section class="card auth-card">
      <h1>Reset Password</h1>
      <p class="auth-note">Enter your username and set a new password.</p>

      <form id="forgotForm" class="form-stack">
        <label for="username">Username</label>
        <input id="username" class="input" name="username" placeholder="Enter username" required>

        <label for="newPassword">New Password</label>
        <input id="newPassword" class="input" type="password" name="newPassword" placeholder="New password" required>

        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" class="input" type="password" name="confirmPassword" placeholder="Confirm password" required>

        <button class="btn" type="submit">Update Password</button>
      </form>

      <div class="row" style="margin-top: 12px;">
        <a class="link" href="/login.html">Back to login</a>
      </div>

      <p id="msg" class="muted"></p>
    </section>
  </main>

  <script src="/forget.js"></script>
</body>
</html>
