<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Forgot Password — Attendance System</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <div class="card" style="max-width:560px;margin:40px auto;background-color:white">
      <h2 style="color:darkblue">Reset Password</h2>
      <form id="forgotForm" style="margin-top:16px;">
        <input class="input" name="username" placeholder="Enter your username" required>
        <input class="input" type="password" name="newPassword" placeholder="New Password" required style="margin-top:10px;">
        <input class="input" type="password" name="confirmPassword" placeholder="Confirm Password" required style="margin-top:10px;">
        <div class="row" style="margin-top:16px;">
          <button class="btn" type="submit">Reset Password</button>
          <a class="link" href="/login.html" style="align-self:center;">Back to Login</a>
        </div>
      </form>
      <p id="msg" class="muted" style="margin-top:12px;"></p>
    </div>
  </div>
  <script src="/forgot.js"></script>
</body>
</html>
