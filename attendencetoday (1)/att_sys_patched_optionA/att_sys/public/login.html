<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login — Attendance System</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Extra login-specific enhancements */
    body {
      background: radial-gradient(circle at top, #1e3a8a 0%, #0f172a 80%);
    }

    .login-card {
      max-width: 420px;
      margin: 60px auto;
      padding: 32px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, .4);
      border: 1px solid rgba(255, 255, 255, .1);
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .login-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 50px rgba(0, 0, 0, .5);
    }

    .login-card h2 {
      color: var(--accent);
      font-size: 28px;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }

    .login-input {
      width: 100%;
      padding: 12px 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: #0b1325;
      color: var(--text);
      font-size: 15px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .login-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.3);
      outline: none;
    }

    .login-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
      align-items: center;
    }

    .login-actions a.link {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .login-actions a.link:hover {
      color: #86efac;
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      font-size: 16px;
      border-radius: 12px;
      padding: 12px 18px;
      background: linear-gradient(90deg, var(--accent), #4ade80);
      color: #06281a;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-login:hover {
      background: linear-gradient(90deg, #4ade80, var(--accent));
      transform: translateY(-2px);
    }

    #msg {
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="login-card">
      <h2>Welcome Back 👋</h2>
      <form id="loginForm">
        <input class="login-input" name="username" placeholder="Enter your username" required>
        <input class="login-input" type="password" name="password" placeholder="Enter your password" required>

        <div class="login-actions">
          <button class="btn-login" type="submit">Login</button>
          <a class="link" href="/register.html">Create an Account</a>
          <a class="link" href="/forget.html">Forgot Password?</a>
        </div>
      </form>
      <p id="msg" class="muted"></p>
    </div>
  </div>

  <script src="/login.js"></script>
</body>
</html>
